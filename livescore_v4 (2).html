<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveScore · Sports Day 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1f4; --surface:#ffffff; --surface2:#f6f8fa;
    --ink:#161b22; --muted:#8b95a1; --line:#e6eaee;
    --green:#22a85e; --green-d:#0f7a40; --orange:#f47b20; --orange-d:#d96712;
    --red:#e23b3b; --yellow:#e3a900; --teal:#36b6c4;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;min-height:100vh;}
  #app{max-width:620px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;}

  /* TOP BAR */
  .topbar{background:var(--green);color:#fff;display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.08);}
  .brand{font-family:'Archivo',sans-serif;font-weight:800;font-size:19px;letter-spacing:.5px;}
  .brand span{font-weight:600;opacity:.85;}
  .admin-chip{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);color:#fff;
    font-size:13px;font-weight:700;padding:6px 12px;border-radius:20px;cursor:pointer;min-width:38px;}
  .admin-chip.on{background:#fff;color:var(--green-d);}

  .screen{display:none;}
  .screen.active{display:block;}

  /* HERO */
  .hero{padding:20px 16px 8px;}
  .hero-title{font-family:'Archivo',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.3px;}
  .hero-title b{color:var(--green);}
  .hero-sub{color:var(--muted);font-size:13px;margin-top:2px;display:flex;align-items:center;gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  /* TABS */
  .tabbar{display:flex;gap:6px;padding:10px 16px 4px;position:sticky;top:54px;background:var(--bg);z-index:40;}
  .tabbtn{flex:1;padding:9px 4px;font-size:13px;font-weight:700;border-radius:10px;border:none;cursor:pointer;
    background:var(--surface);color:var(--muted);box-shadow:0 1px 2px rgba(0,0,0,.04);transition:.15s;}
  .tabbtn.active{background:var(--green);color:#fff;}

  .list-body{padding:8px 16px 40px;}
  .sec-label{font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);
    margin:18px 4px 8px;display:flex;align-items:center;gap:8px;}
  .sec-label::after{content:'';flex:1;height:1px;background:var(--line);}
  .sec-label.ko{color:var(--orange);}

  /* FIXTURE ROW */
  .fixture{background:var(--surface);border-radius:14px;padding:11px 14px;margin-bottom:10px;cursor:pointer;
    box-shadow:0 1px 3px rgba(20,30,45,.06);transition:transform .08s,box-shadow .15s;}
  .fixture:active{transform:scale(.99);}
  .fx-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .fx-live{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:var(--green);letter-spacing:.5px;}
  .fx-live b{font-family:'Archivo';font-variant-numeric:tabular-nums;}
  .fx-ft{font-size:11px;font-weight:800;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:5px;letter-spacing:.5px;}
  .fx-up{font-size:11px;font-weight:700;color:var(--muted);}
  .fx-field{font-size:10px;color:var(--muted);background:var(--surface2);padding:2px 7px;border-radius:5px;}
  .fx-row{display:flex;align-items:center;gap:8px;}
  .fx-team{flex:1;display:flex;align-items:center;gap:9px;min-width:0;}
  .fx-team.away{flex-direction:row-reverse;text-align:right;}
  .fx-crest{width:30px;height:30px;flex-shrink:0;}
  .fx-crest svg{width:100%;height:100%;display:block;}
  .fx-name{font-size:13.5px;font-weight:600;line-height:1.15;overflow:hidden;}
  .fx-score{font-family:'Archivo';font-weight:800;font-size:22px;flex-shrink:0;display:flex;gap:6px;font-variant-numeric:tabular-nums;}
  .fx-score span{color:var(--muted);font-weight:600;}
  .fx-time{font-family:'Archivo';font-weight:700;font-size:14px;color:var(--muted);flex-shrink:0;min-width:42px;text-align:center;}

  /* STANDINGS / SCORERS */
  .panel{background:var(--surface);border-radius:14px;padding:6px 4px;margin-bottom:14px;box-shadow:0 1px 3px rgba(20,30,45,.06);overflow:hidden;}
  table.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
  .tbl th{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:800;padding:8px 3px;text-align:center;}
  .tbl th.l{text-align:left;padding-left:10px;}
  .tbl td{padding:9px 3px;text-align:center;border-top:1px solid var(--line);}
  .tbl td.l{text-align:left;padding-left:10px;font-weight:600;}
  .tbl .nm{display:flex;align-items:center;gap:8px;}
  .tbl .nm svg{width:20px;height:20px;}
  .tbl .pos{color:var(--muted);width:20px;}
  .tbl tr.q td.pos{color:var(--green);font-weight:800;}
  .tbl tr.q td.l{box-shadow:inset 3px 0 0 var(--green);}
  .tbl .pts{font-family:'Archivo';font-weight:800;color:var(--green);}
  .q-note{font-size:11px;color:var(--muted);padding:8px 10px 4px;}
  .sc-rank{font-family:'Archivo';font-weight:800;width:34px;}
  .sc-goals{font-family:'Archivo';font-weight:800;font-size:18px;color:var(--green);width:46px;}
  .sc-team{color:var(--muted);font-size:11px;}
  .sc-top td{background:rgba(34,168,94,.06);}
  .empty{color:var(--muted);font-size:13px;padding:18px;text-align:center;}

  /* MATCH DETAIL */
  #match-body{padding-bottom:152px;}
  .md-top{color:#fff;padding:12px 14px;position:sticky;top:0;z-index:30;}
  .md-back{background:none;border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;}
  .md-scoreboard{background:var(--surface);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;
    padding:18px 14px;border-bottom:1px solid var(--line);}
  .md-team{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
  .md-crest{width:46px;height:46px;}
  .md-crest svg{width:100%;height:100%;}
  .md-tname{font-size:12px;font-weight:700;line-height:1.2;max-width:120px;}
  .md-scorewrap{display:flex;align-items:center;gap:12px;}
  .md-score{font-family:'Archivo';font-weight:900;font-size:46px;line-height:1;font-variant-numeric:tabular-nums;}
  .md-v{font-family:'Archivo';font-weight:700;font-size:20px;color:var(--muted);}
  .md-statusbar{background:#2c333c;color:#fff;font-size:12.5px;font-weight:700;letter-spacing:.5px;
    text-align:center;padding:9px;}

  /* TIMELINE */
  .timeline{position:relative;padding:18px 12px 22px;}
  .timeline::before{content:'';position:absolute;top:0;bottom:0;left:50%;width:2px;background:var(--line);transform:translateX(-50%);}
  .tl-empty{position:relative;text-align:center;color:var(--muted);font-size:13px;padding:30px 0;}
  .tl-row{display:grid;grid-template-columns:1fr 56px 1fr;align-items:center;margin-bottom:16px;position:relative;}
  .tl-side{display:flex;align-items:center;gap:8px;min-width:0;}
  .tl-side.left{justify-content:flex-end;text-align:right;}
  .tl-side.right{justify-content:flex-start;text-align:left;}
  .tl-text .tl-type{font-size:11px;font-weight:800;letter-spacing:.5px;}
  .tl-text .tl-name{font-size:12.5px;font-weight:600;color:var(--ink);margin-top:1px;}
  .tl-icon{font-size:15px;line-height:1;flex-shrink:0;}
  .tl-center{display:flex;justify-content:center;}
  .tl-min{font-family:'Archivo';font-weight:800;font-size:12px;background:var(--surface);
    border:2px solid var(--green);color:var(--green);border-radius:50%;width:34px;height:34px;
    display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;z-index:1;}
  .tl-edit{background:var(--surface2);border:1px solid var(--line);color:var(--muted);font-size:12px;cursor:pointer;padding:3px 7px;border-radius:6px;line-height:1;}
  .tl-edit:hover{color:var(--green-d);border-color:var(--green);}
  .ee-del{border-color:var(--red)!important;color:var(--red)!important;}

  /* DOCK (console + footer) */
  .md-dock{position:fixed;bottom:0;left:0;right:0;z-index:35;}
  .dock-inner{max-width:620px;margin:0 auto;}
  .console{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px;background:var(--line);}
  .act{border:none;padding:16px 4px;font-size:13px;font-weight:800;cursor:pointer;color:#fff;}
  .act-goal{background:var(--green);}
  .act-goal:active{background:var(--green-d);}
  .act-evt{background:#3a424c;}
  .act-evt:active{background:#2c333c;}
  .md-footer{background:#1f262e;color:#fff;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 14px;}
  .mf-clock{text-align:center;}
  .mf-status{font-size:10px;font-weight:700;letter-spacing:1.5px;color:#9aa6b2;}
  .mf-time{font-family:'Archivo';font-weight:800;font-size:26px;line-height:1;font-variant-numeric:tabular-nums;}
  .mf-side{display:flex;}
  .mf-side.right{justify-content:flex-end;}
  .mf-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:13px;font-weight:700;
    padding:8px 16px;border-radius:8px;cursor:pointer;}
  .mf-btn.start{background:var(--green);border-color:var(--green);}
  .mf-btn.stop{background:var(--orange);border-color:var(--orange);}

  /* SHEET / MODAL */
  .sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-end;justify-content:center;}
  .sheet-overlay.open{display:flex;}
  .sheet{background:var(--surface);width:100%;max-width:620px;border-radius:18px 18px 0 0;padding:8px 18px 26px;
    max-height:86vh;overflow-y:auto;animation:slideup .2s ease;}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet-handle{width:40px;height:4px;background:var(--line);border-radius:3px;margin:6px auto 14px;}
  .sheet-title{font-family:'Archivo';font-weight:800;font-size:18px;margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .field select,.field input{width:100%;background:var(--surface2);border:1.5px solid var(--line);color:var(--ink);
    border-radius:10px;padding:12px;font-family:'Inter';font-size:15px;outline:none;}
  .field select:focus,.field input:focus{border-color:var(--green);}
  .btn-primary{width:100%;padding:14px;background:var(--green);color:#fff;font-size:16px;font-weight:800;
    border:none;border-radius:10px;cursor:pointer;}
  .btn-primary:active{background:var(--green-d);}
  .btn-secondary{width:100%;padding:12px;background:var(--surface2);color:var(--ink);font-size:14px;font-weight:700;
    border:1.5px solid var(--line);border-radius:10px;cursor:pointer;margin-top:8px;}
  .backup-row{display:flex;gap:8px;}
  .backup-row .btn-secondary{margin-top:0;}
  .save-state{font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px;}
  .save-state b{color:var(--green);}
  .err{color:var(--red);font-size:12px;margin-bottom:10px;}


  /* LINEUP / PITCH */
  .view-toggle{display:flex;gap:6px;padding:12px 14px 6px;background:var(--surface);}
  .vt{flex:1;padding:9px;border:none;border-radius:9px;font-weight:700;font-size:13px;background:var(--surface2);color:var(--muted);cursor:pointer;}
  .vt.on{background:var(--ink);color:#fff;}
  .pitch{position:relative;display:flex;flex-direction:column;padding:6px;overflow:hidden;
    background-color:#249150;background-image:repeating-linear-gradient(#249150 0 30px,#2c9c58 30px 60px);min-height:480px;}
  .pitch::before{content:'';position:absolute;left:8px;right:8px;top:50%;height:2px;background:rgba(255,255,255,.35);}
  .pitch::after{content:'';position:absolute;left:50%;top:50%;width:78px;height:78px;border:2px solid rgba(255,255,255,.35);border-radius:50%;transform:translate(-50%,-50%);}
  .pbox{position:absolute;left:50%;transform:translateX(-50%);width:54%;height:50px;border:2px solid rgba(255,255,255,.3);z-index:0;}
  .pbox.top{top:-2px;border-top:none;}
  .pbox.bot{bottom:-2px;border-bottom:none;}
  .phalf{flex:1;display:flex;flex-direction:column;justify-content:space-around;position:relative;z-index:1;padding:14px 0;}
  .prow{display:flex;justify-content:space-around;align-items:center;}
  .ptoken{display:flex;flex-direction:column;align-items:center;gap:4px;width:64px;}
  .phalf.away .ptoken{flex-direction:column-reverse;}
  .pt-shirt{position:relative;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Archivo';font-weight:800;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,.35);}
  .pt-shirt.home{background:#ffffff;color:#15321e;}
  .pt-shirt.away{background:#13233f;color:#fff;}
  .pt-shirt.off{opacity:.4;}
  .pt-name{font-size:9.5px;font-weight:700;color:#fff;text-align:center;text-shadow:0 1px 2px rgba(0,0,0,.6);line-height:1.1;max-width:66px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pt-goal{margin-right:1px;}
  .pt-card{position:absolute;top:-2px;right:-3px;width:8px;height:11px;border-radius:2px;display:inline-block;}
  .pt-card.yel{background:var(--yellow);}
  .pt-card.red{background:var(--red);}
  .pt-sub{position:absolute;bottom:-4px;left:-4px;font-size:12px;font-weight:900;}
  .pt-sub.off{color:#ff5a5a;text-shadow:0 0 2px #000;}
  .lineup-note{background:#2c333c;color:#cdd6df;font-size:11px;font-weight:700;letter-spacing:.5px;text-align:center;padding:7px;}
  .bench-wrap{background:var(--surface);padding:14px;}
  .sub-bar{display:flex;gap:8px;margin-bottom:14px;}
  .sub-bar button{flex:1;padding:11px;border:1.5px solid var(--green);background:rgba(34,168,94,.08);color:var(--green-d);font-weight:700;font-size:12.5px;border-radius:10px;cursor:pointer;}
  .bench-head{font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .bench-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .bteam{font-size:11px;font-weight:800;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .bteam svg{width:18px;height:18px;flex-shrink:0;}
  .bteam span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bcol.away{text-align:right;}
  .bcol.away .bteam{flex-direction:row-reverse;}
  .bitem{display:flex;align-items:center;gap:8px;padding:5px 0;}
  .bcol.away .bitem{flex-direction:row-reverse;}
  .bava{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--line);font-size:9px;font-weight:800;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .binfo{min-width:0;}
  .bname{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bnum{font-size:10px;color:var(--muted);}
  .bon{color:var(--green);font-size:12px;font-weight:900;}
  .bench-empty{font-size:12px;color:var(--muted);}


  .lu-tools{display:flex;gap:8px;margin-bottom:8px;}
  .lu-tools button{flex:1;padding:11px;border:1.5px solid var(--line);background:var(--surface2);color:var(--ink);font-weight:700;font-size:12.5px;border-radius:10px;cursor:pointer;}
  .lu-slot{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .lu-pos{width:40px;flex-shrink:0;font-size:10px;font-weight:800;letter-spacing:.5px;color:var(--green);}
  .lu-slot select{flex:1;background:var(--surface2);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;padding:11px;font-family:'Inter';font-size:14px;}
  .lu-bench{font-size:12.5px;color:var(--muted);margin-top:12px;line-height:1.6;}
  .lu-bench b{color:var(--ink);font-weight:600;}

  /* TOAST */
  .toast{position:fixed;bottom:170px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;
    font-weight:700;font-size:13.5px;padding:11px 22px;border-radius:24px;z-index:2000;transition:transform .3s,opacity .3s;
    opacity:0;visibility:hidden;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:.97;visibility:visible;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">LIVE<span>SCORE</span></div>
    <button class="admin-chip" id="admin-chip" onclick="onAdminChip()">&#9881;</button>
  </div>

  <section id="screen-list" class="screen active">
    <div class="hero">
      <div class="hero-title">Sports Day <b>2026</b></div>
      <div class="hero-sub"><span class="dot"></span> Live scores</div>
    </div>
    <div class="tabbar">
      <button class="tabbtn active" data-tab="male" onclick="switchTab('male')">Male</button>
      <button class="tabbtn" data-tab="female" onclick="switchTab('female')">Female</button>
      <button class="tabbtn" data-tab="standings" onclick="switchTab('standings')">Table</button>
      <button class="tabbtn" data-tab="scorers" onclick="switchTab('scorers')">Scorers</button>
    </div>
    <div id="list-body" class="list-body"></div>
  </section>

  <section id="screen-match" class="screen">
    <div id="match-body"></div>
  </section>
</div>

<div class="sheet-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// SVG LOGOS — inline, keyed by team name
// ═══════════════════════════════════════════

  'ROGUSE': `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="20" r="19" fill="#1a1a1a"/>
    <circle cx="20" cy="20" r="19" fill="none" stroke="#E63946" stroke-width="2"/>
    <text x="20" y="24" text-anchor="middle" font-size="16" fill="#E63946" font-family="sans-serif" font-weight="900">R</text>

  'GROfinity': `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="20" r="19" fill="#0a0a2a"/>
    <path d="M10,20 Q15,10 20,20 Q25,30 30,20" stroke="#00CFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="10" cy="20" r="2.5" fill="#00CFFF"/>

    <text x="20" y="35" text-anchor="middle" font-size="5.5" fill="#00CFFF" font-family="sans-serif" font-weight="bold" letter-spacing="0.5">GROfinity</text>
  </svg>`,

function allMatchSets() {
  return [
    data.male.groupA.matches, data.male.groupB.matches, data.male.knockout,
    data.female.group.matches, data.female.knockout
  ];
}
function eachMatch(fn) { allMatchSets().forEach(set => set.forEach(fn)); }
function getMatchById(id) { let found=null; eachMatch(m=>{ if(m.id===id) found=m; }); return found; }

// Knockout matches (Semi-Final / Final) run 30 min; group matches run 15 min.
function matchMaxMinute(m) { return /semi|final/i.test(m.round||'') ? 30 : 15; }

// ═══════════════════════════════════════════
// PERSISTENCE  —  local drive (localStorage) + web drive (JSON export/import)
// ═══════════════════════════════════════════
const STORAGE_KEY = 'livescore_sportsday2026_v3';

// Pull only the editable, per-match fields so structure stays code-controlled.
function serializeState() {
  const matches = {};
  eachMatch(m => {
    matches[m.id] = {
      status:m.status, time:m.time,
      homeScore:m.homeScore, awayScore:m.awayScore,
      home:m.home, away:m.away, events:m.events||[],
      clockElapsed:m.clockElapsed||0, clockStart:m.clockStart||null, clockRunning:!!m.clockRunning,
      lineup:m.lineup||null
    };
  });
  return { savedAt: Date.now(), version: 3, matches };
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeState()));
    updateSaveState();
  } catch (e) { /* storage full or blocked — silent */ }
}

function applyState(state) {
  if (!state || !state.matches) return;
  eachMatch(m => {
    const s = state.matches[m.id];
    if (!s) return;
    m.status=s.status; m.time=s.time;
    m.homeScore=(s.homeScore===undefined?null:s.homeScore);
    m.awayScore=(s.awayScore===undefined?null:s.awayScore);
    if (s.home) m.home=s.home;
    if (s.away) m.away=s.away;
    m.events=s.events||[];
    m.clockElapsed=s.clockElapsed||0;
    m.clockStart=s.clockStart||null;
    m.clockRunning=!!s.clockRunning;
    if(s.lineup)m.lineup=s.lineup;
  });
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) applyState(JSON.parse(raw));
  } catch (e) { /* corrupt entry — ignore and start fresh */ }
}

// Web drive: download a backup file the user saves to OneDrive / Google Drive.
function exportData() {
  const blob = new Blob([JSON.stringify(serializeState(), null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
  a.href = url; a.download = `sportsday2026-scores-${stamp}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Backup downloaded');
}

// Web drive: restore from a backup file.
function importData(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const state = JSON.parse(reader.result);
      applyState(state);
      saveData();
      renderAll();
      if (document.getElementById('modal').classList.contains('open') && adminSession) showAdminPanel();
      showToast('Backup restored');
    } catch (e) { showToast('Error: invalid backup file'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function updateSaveState() {
  const el = document.getElementById('save-state');
  if (!el) return;
  let raw; try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e){}
  if (raw && raw.savedAt) {
    const t = new Date(raw.savedAt);
    el.innerHTML = `Auto-saved to this device · last save <b>${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}</b>`;
  } else {
    el.textContent = 'Not saved yet';
  }
}

// ═══════════════════════════════════════════
// LIVE CLOCK  —  counts up from kickoff, manual start/stop
// ═══════════════════════════════════════════
function clockSeconds(m) {
  let s = m.clockElapsed || 0;
  if (m.clockRunning && m.clockStart) s += (Date.now() - m.clockStart) / 1000;
  const cap = matchMaxMinute(m) * 60;
  return Math.min(s, cap);
}
function fmtClock(s) {
  const mm = Math.floor(s / 60), ss = Math.floor(s % 60);
  return String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}
function startClock(id) {
  const m = getMatchById(id); if (!m) return;
  if (!m.clockRunning) {
    m.clockRunning = true;
    m.clockStart = Date.now();
    if (m.status === 'upcoming') m.status = 'live';
  }
  saveData(); renderAll(); if (adminSession) showEditMatch(id);
}
function pauseClock(id) {
  const m = getMatchById(id); if (!m) return;
  m.clockElapsed = clockSeconds(m);
  m.clockRunning = false; m.clockStart = null;
  saveData(); renderAll(); if (adminSession) showEditMatch(id);
}
function resetClock(id) {
  const m = getMatchById(id); if (!m) return;
  m.clockElapsed = 0; m.clockRunning = false; m.clockStart = null;
  saveData(); renderAll(); if (adminSession) showEditMatch(id);
}
// Tick running clocks once per second without a full re-render.
setInterval(() => {
  eachMatch(m => {
    if (!m.clockRunning) return;
    const secs = clockSeconds(m);
    const card = document.getElementById('clock-' + m.id);
    if (card) card.textContent = fmtClock(secs);
    const modal = document.getElementById('modalclock-' + m.id);
    if (modal) modal.textContent = fmtClock(secs);
  });
}, 1000);

function divAccent(div){ return div==='female'?'var(--orange)':'var(--green)'; }

function recomputeScore(m){
  if(m.status==='upcoming'){ m.homeScore=null; m.awayScore=null; return; }
  const g=(m.events||[]).filter(e=>e.type==='goal');
  m.homeScore=g.filter(e=>e.team==='home').length;
  m.awayScore=g.filter(e=>e.team==='away').length;
}

function buildPlayerOptions(teamName, selected){
  const list=PLAYERS[teamName]||[];
  let html=`<option value="">— Player —</option>`;
  if(list.length) html+=list.map(n=>`<option value="${n}"${selected===n?' selected':''}>${n}</option>`).join('');
  else html+=`<option value="${selected||''}">${selected||'No roster'}</option>`;
  return html;
}
function minuteOptions(max, selected){
  let html=`<option value="">min</option>`;
  for(let i=0;i<=max;i++) html+=`<option value="${i}"${String(selected)===String(i)?' selected':''}>${i}'</option>`;
  return html;
}

// ---------- STANDINGS (compute unchanged) ----------
function computeStandings(teams, matches){
  const table={};
  teams.forEach(t=>{ table[t]={played:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  matches.forEach(m=>{
    const hasScore=m.homeScore!==null&&m.awayScore!==null;
    if((m.status==='ft'||m.status==='live')||(hasScore&&m.status==='upcoming')){
      const h=m.home,a=m.away,hs=m.homeScore??0,as=m.awayScore??0;
      if(!table[h]||!table[a])return;
      if(m.status==='ft'||m.status==='live'){
        table[h].played++;table[a].played++;
        if(hs>as){table[h].w++;table[h].pts+=3;table[a].l++;}
        else if(hs<as){table[a].w++;table[a].pts+=3;table[h].l++;}
        else{table[h].d++;table[h].pts++;table[a].d++;table[a].pts++;}
      }
      table[h].gf+=hs;table[h].ga+=as;table[a].gf+=as;table[a].ga+=hs;
    }
  });
  return Object.entries(table).map(([name,s])=>({name,...s,gd:s.gf-s.ga}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}
function computeScorers(allMatches){
  const sc={};
  allMatches.forEach(m=>{(m.events||[]).forEach(e=>{
    if(e.type!=='goal')return;
    const name=(e.player||'').trim(); if(!name)return;
    let team;
    if(e.team==='home')team=m.home; else if(e.team==='away')team=m.away;
    else{const pl=name.toLowerCase();const aw=(PLAYERS[m.away]||[]).map(p=>p.toLowerCase());const ho=(PLAYERS[m.home]||[]).map(p=>p.toLowerCase());team=(aw.includes(pl)&&!ho.includes(pl))?m.away:m.home;}
    const key=team+'|'+name;
    if(!sc[key])sc[key]={name,team,goals:0};
    sc[key].goals++;
  });});
  return Object.values(sc).sort((a,b)=>b.goals-a.goals);
}

  const m=getMatchById(openMatchId); if(!m)return;
  const type=document.getElementById('sheet-type').value;
  const player=document.getElementById('sheet-player').value;
  const minute=document.getElementById('sheet-min').value;
  if(!player){showToast('Choose a player');return;}
  m.events=m.events||[]; m.events.push({team:side,type,player,minute});

}
function removeEvent(id,idx){
  const m=getMatchById(id); if(!m||!m.events[idx])return;
  const ev=m.events[idx];
  if(ev.pair){
    ensureLineup(m); const L=m.lineup[ev.team];
    const onEv=m.events.find(e=>e.pair===ev.pair&&e.type==='sub_on');
    const offEv=m.events.find(e=>e.pair===ev.pair&&e.type==='sub_off');
    if(onEv&&offEv){ const si=L.starters.indexOf(onEv.player); if(si>=0)L.starters[si]=offEv.player; const bi=L.bench.indexOf(offEv.player); if(bi>=0)L.bench[bi]=onEv.player; }
    m.events=m.events.filter(e=>e.pair!==ev.pair);
    saveData(); closeModal(); renderAll(); showToast('Substitution removed'); return;
  }
  m.events.splice(idx,1); recomputeScore(m); saveData(); closeModal(); renderAll(); showToast('Event deleted');
}

       <div class="field"><label>Minute (0\u2013${max})</label><select id="ee-min">${minuteOptions(max, offEv?offEv.minute:'')}</select></div>

     <button class="btn-primary" onclick="saveEventEdit('${id}',${idx})">Save changes</button>
     <button class="btn-secondary ee-del" onclick="removeEvent('${id}',${idx})">Delete event</button>
     <button class="btn-secondary" onclick="closeModal()">Cancel</button>`);

// Override clock + import handlers from the engine so they refresh the new UI.
function startClock(id){ const m=getMatchById(id); if(!m)return; if(!m.clockRunning){m.clockRunning=true;m.clockStart=Date.now();if(m.status==='upcoming')m.status='live';} saveData(); renderAll(); }
function pauseClock(id){ const m=getMatchById(id); if(!m)return; m.clockElapsed=clockSeconds(m); m.clockRunning=false; m.clockStart=null; saveData(); renderAll(); }
function resetClock(id){ const m=getMatchById(id); if(!m)return; m.clockElapsed=0; m.clockRunning=false; m.clockStart=null; saveData(); renderAll(); }
function importData(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{ try{ applyState(JSON.parse(r.result)); saveData(); renderAll(); showToast('Backup restored'); }catch(e){ showToast('Invalid backup file'); } };
  r.readAsText(file); input.value='';
}

function hideToast(){ const t=document.getElementById('toast'); if(t)t.classList.remove('show'); clearTimeout(window._toastT); }
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(window._toastT); window._toastT=setTimeout(hideToast,2000);
}
// Dismiss the toast immediately on any tap/click anywhere.
document.addEventListener('pointerdown',()=>{ const t=document.getElementById('toast'); if(t&&t.classList.contains('show'))hideToast(); },true);


// ═══════════════════════════════════════════
// LINEUP  (formation pitch + bench + paired subs)
// ═══════════════════════════════════════════
function starterCount(m){ const mt=(m.field||'').match(/(\d+)\s*v/i); return mt?parseInt(mt[1]):7; }
function ensureLineup(m){
  if(m.lineup&&m.lineup.home&&m.lineup.away)return;
  const n=starterCount(m);
  const mk=team=>{ const r=(PLAYERS[team]||[]).slice(); return {starters:r.slice(0,n),bench:r.slice(n)}; };
  m.lineup={home:mk(m.home),away:mk(m.away)};
}
function shortName(n){ const p=String(n||'').trim().split(/\s+/); return p.length>=2 ? p[0][0]+'. '+p[p.length-1] : (n||''); }
function shortInit(n){ const p=String(n||'').trim().split(/\s+/); return (p[0]?p[0][0]:'')+(p.length>=2?p[p.length-1][0]:''); }
function formationRows(n){
  if(n<=0)return[]; if(n===7)return[1,3,2,1]; if(n===6)return[1,2,2,1]; if(n===5)return[1,2,2];
  const rest=n-1, per=Math.max(1,Math.ceil(rest/3)), rows=[1]; let r=rest;
  while(r>0){ const t=Math.min(per,r); rows.push(t); r-=t; } return rows;
}
function sliceRows(arr,counts){ const out=[]; let i=0; counts.forEach(c=>{ out.push(arr.slice(i,i+c)); i+=c; }); if(i<arr.length)out.push(arr.slice(i)); return out; }
function playerBadges(m,side,name){
  let goals=0,yellow=false,red=false,subOff=false,subOn=false;
  (m.events||[]).forEach(e=>{ if(e.team!==side||e.player!==name)return;
    if(e.type==='goal')goals++; else if(e.type==='yellow')yellow=true; else if(e.type==='red')red=true;
    else if(e.type==='sub_off')subOff=true; else if(e.type==='sub_on')subOn=true; });
  return {goals,yellow,red,subOff,subOn};
}
function playerToken(m,team,name,side){
  const num=jerseyNo(team,name); const b=playerBadges(m,side,name);
  const card=b.red?'<span class="pt-card red"></span>':b.yellow?'<span class="pt-card yel"></span>':'';
  const sub=b.subOff?'<span class="pt-sub off">\u25BE</span>':'';
  const goal=b.goals?`<span class="pt-goal">\u26BD${b.goals>1?'\u00D7'+b.goals:''}</span>`:'';
  return `<div class="ptoken"><div class="pt-shirt ${side} ${b.subOff?'off':''}">${num||''}${card}${sub}</div><div class="pt-name">${goal}${shortName(name)}</div></div>`;
}
function renderHalf(m,side){
  const team=side==='home'?m.home:m.away; const L=m.lineup[side];
  let rows=sliceRows(L.starters, formationRows(L.starters.length));
  if(side==='away')rows=rows.slice().reverse();
  return `<div class="phalf ${side}">${rows.map(r=>`<div class="prow">${r.map(p=>playerToken(m,team,p,side)).join('')}</div>`).join('')}</div>`;
}
function renderBenchCol(m,side){
  const team=side==='home'?m.home:m.away; const L=m.lineup[side];
  const items=L.bench.length ? L.bench.map(p=>{
    const b=playerBadges(m,side,p);
    const status=b.subOn?'<span class="bon">\u25B2</span>':b.red?'<span class="pt-card red" style="position:static"></span>':b.yellow?'<span class="pt-card yel" style="position:static"></span>':'';
    return `<div class="bitem"><div class="bava">${shortInit(p)}</div><div class="binfo"><div class="bname">${p}</div><div class="bnum">#${jerseyNo(team,p)}</div></div>${status}</div>`;
  }).join('') : '<div class="bench-empty">No bench players</div>';
  return `<div class="bcol ${side}"><div class="bteam">${getLogo(team)}<span>${team}</span></div>${items}</div>`;
}
function renderLineup(m){
  ensureLineup(m);
  const admin=adminSession===matchDivision(m.id);
  const n=starterCount(m);
  const subBar=admin?`<div class="lu-tools"><button onclick="openLineupEditor('home')">\u270E Lineup \u00B7 ${m.home}</button><button onclick="openLineupEditor('away')">\u270E Lineup \u00B7 ${m.away}</button></div><div class="sub-bar"><button onclick="openSubSheet('home')">\u21C4 Sub \u00B7 ${m.home}</button><button onclick="openSubSheet('away')">\u21C4 Sub \u00B7 ${m.away}</button></div>`:'';
  return `<div class="pitch"><div class="pbox top"></div><div class="pbox bot"></div>${renderHalf(m,'home')}${renderHalf(m,'away')}</div>
    <div class="lineup-note">${n} v ${n} \u00B7 ${m.field||''}</div>
    <div class="bench-wrap">${subBar}<div class="bench-head">Substitutes</div>
      <div class="bench-cols">${renderBenchCol(m,'home')}${renderBenchCol(m,'away')}</div></div>`;
}

// ---- manual lineup editor (pre-match setup, no events logged) ----
function slotLabels(n){
  const rows=formationRows(n), labels=[];
  rows.forEach((c,ri)=>{ let lab; if(ri===0)lab='GK'; else if(ri===rows.length-1)lab='FWD'; else if(rows.length>=4&&ri===1)lab='DEF'; else lab='MID'; for(let k=0;k<c;k++)labels.push(lab); });
  return labels;
}
function openLineupEditor(side){
  const m=getMatchById(openMatchId); if(!m)return; ensureLineup(m);
  window._luSide=side;
  window._luTeam=side==='home'?m.home:m.away;
  window._lu={ starters:m.lineup[side].starters.slice(), bench:m.lineup[side].bench.slice() };
  renderLineupEditor();
}
function renderLineupEditor(){
  const team=window._luTeam, L=window._lu;
  const roster=PLAYERS[team]||[];
  const labels=slotLabels(L.starters.length);
  const slots=L.starters.map((p,i)=>{
    const opts=roster.map(n=>`<option value="${n}"${n===p?' selected':''}>${jerseyNo(team,n)} \u00B7 ${n}</option>`).join('');
    return `<div class="lu-slot"><span class="lu-pos">${labels[i]||''}</span><select onchange="lineupSlotChange(${i},this.value)">${opts}</select></div>`;
  }).join('');
  const benchTxt=L.bench.length?L.bench.map(p=>`<b>${p}</b>`).join(', '):'<i>none</i>';
  openSheet('\u270E Edit lineup \u2014 '+team,
    `<div class="save-state" style="text-align:left;margin:0 0 12px">Set the starting ${L.starters.length}. Picking a bench player for a slot swaps them in. This is setup only \u2014 it does not log a substitution.</div>
     ${slots}
     <div class="lu-bench">Bench: ${benchTxt}</div>
     <button class="btn-primary" style="margin-top:16px" onclick="saveLineupEditor()">Save lineup</button>
     <button class="btn-secondary" onclick="closeModal()">Cancel</button>`);
}
function lineupSlotChange(i,P){
  const L=window._lu; const Q=L.starters[i]; if(P===Q){renderLineupEditor();return;}
  const j=L.starters.indexOf(P);
  if(j>=0){ L.starters[j]=Q; L.starters[i]=P; }
  else { const bi=L.bench.indexOf(P); L.starters[i]=P; if(bi>=0)L.bench[bi]=Q; else L.bench.push(Q); }
  renderLineupEditor();
}
function saveLineupEditor(){
  const m=getMatchById(openMatchId); if(!m)return;
  m.lineup[window._luSide]={ starters:window._lu.starters.slice(), bench:window._lu.bench.slice() };
  saveData(); closeModal(); renderAll(); showToast('Lineup saved');
}
function setMatchView(v){ matchView=v; if(openMatchId)renderMatchScreen(openMatchId); }


// ---- paired substitution ----
function openSubSheet(side){
  const m=getMatchById(openMatchId); if(!m)return; ensureLineup(m);
  const team=side==='home'?m.home:m.away; const L=m.lineup[side];
  if(!L.bench.length){ showToast('No bench players to bring on'); return; }
  const max=matchMaxMinute(m); const def=Math.min(Math.floor(clockSeconds(m)/60),max);
  openSheet(`\u21C4 Substitution \u2014 ${team}`,
    `<div class="field"><label>Player OUT (on pitch)</label><select id="sub-out">${L.starters.map(p=>`<option value="${p}">${jerseyNo(team,p)} \u00B7 ${p}</option>`).join('')}</select></div>
     <div class="field"><label>Player IN (from bench)</label><select id="sub-in">${L.bench.map(p=>`<option value="${p}">${jerseyNo(team,p)} \u00B7 ${p}</option>`).join('')}</select></div>
     <div class="field"><label>Minute (0\u2013${max})</label><select id="sub-min">${minuteOptions(max,def)}</select></div>
     <div class="save-state" style="text-align:left;margin:0 0 12px">Out and in are recorded together, so the team stays at ${starterCount(m)} players.</div>
     <button class="btn-primary" onclick="confirmSub('${side}')">Confirm substitution</button>
     <button class="btn-secondary" onclick="closeModal()">Cancel</button>`);
}
function confirmSub(side){
  const m=getMatchById(openMatchId); if(!m)return; ensureLineup(m);
  const out=document.getElementById('sub-out').value, inp=document.getElementById('sub-in').value, minute=document.getElementById('sub-min').value;
  if(!out||!inp){ showToast('Choose both players'); return; }
  if(out===inp){ showToast('Pick two different players'); return; }
  const L=m.lineup[side]; const oi=L.starters.indexOf(out), bi=L.bench.indexOf(inp);
  if(oi<0||bi<0){ showToast('Lineup changed \u2014 reopen'); return; }
  L.starters[oi]=inp; L.bench[bi]=out;
  const pair='sub'+Date.now();
  m.events=m.events||[];
  m.events.push({team:side,type:'sub_off',player:out,minute,pair});
  m.events.push({team:side,type:'sub_on', player:inp,minute,pair});
  if(m.status==='upcoming')m.status='live';
  saveData(); closeModal(); renderAll(); showToast(`${shortName(out)} \u2193  ${shortName(inp)} \u2191`);
}

function renderAll(){
  updateAdminChip();
  renderListScreen();
  if(openMatchId) renderMatchScreen(openMatchId);
}

loadData();
renderAll();
</script>
